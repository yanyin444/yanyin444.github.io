<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox Christmas Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            line-height: 1.7;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            background-image: radial-gradient(#222222 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .game-container {
            border: 2px solid #ffffff;
            border-radius: 2px;
            padding: 30px;
            margin-bottom: 25px;
            min-height: 480px;
            background-color: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .game-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
        }
        
        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            letter-spacing: 3px;
            padding-bottom: 15px;
            position: relative;
            text-transform: uppercase;
            font-weight: 300;
        }
        
        .title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.1em;
            color: #cccccc;
            font-style: italic;
            letter-spacing: 1px;
        }
        
        .story-text {
            font-size: 1.25em;
            margin-bottom: 35px;
            padding: 20px;
            border-left: 4px solid #ffffff;
            background-color: rgba(30, 30, 30, 0.4);
            border-radius: 0 4px 4px 0;
            text-align: justify;
            line-height: 1.8;
            transition: all 0.3s ease;
        }
        
        .story-text:hover {
            background-color: rgba(40, 40, 40, 0.5);
        }
        
        .vox-dialogue {
            color: #ff6b6b;
            font-weight: 500;
        }
        
        .character-dialogue {
            color: #4ecdc4;
            font-style: italic;
        }
        
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 30px;
        }
        
        .choice-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 2px;
            padding: 16px 22px;
            font-size: 1.15em;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .choice-btn::before {
            content: "▶";
            position: absolute;
            left: 10px;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .choice-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateX(8px);
            padding-left: 35px;
            border-color: #ff6b6b;
        }
        
        .choice-btn:hover::before {
            opacity: 1;
        }
        
        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            border-color: #666666;
        }
        
        .choice-btn:disabled:hover {
            padding-left: 22px;
            background-color: transparent;
        }
        
        .choice-btn:disabled:hover::before {
            opacity: 0;
        }
        
        .game-stats {
            border: 2px solid #ffffff;
            border-radius: 2px;
            padding: 18px;
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 0.95em;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }
        
        .stats-item {
            display: flex;
            flex-direction: column;
        }
        
        .stats-label {
            font-size: 0.85em;
            color: #aaaaaa;
            margin-bottom: 5px;
        }
        
        .stats-value {
            font-size: 1.1em;
            font-weight: 500;
        }
        
        .endings-container {
            border: 2px solid #ffffff;
            border-radius: 2px;
            padding: 25px;
            margin-top: 25px;
            display: none;
            background-color: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        
        .endings-title {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 1px solid #ffffff;
            padding-bottom: 12px;
            letter-spacing: 1px;
        }
        
        .endings-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            justify-content: center;
        }
        
        .ending-badge {
            border: 1px solid #ffffff;
            border-radius: 2px;
            padding: 12px 15px;
            font-size: 0.95em;
            text-align: center;
            transition: all 0.3s ease;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .ending-unlocked {
            background-color: rgba(30, 60, 30, 0.5);
            border-color: #4ecdc4;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.3);
        }
        
        .ending-unlocked:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 12px rgba(78, 205, 196, 0.4);
        }
        
        .ending-locked {
            background-color: rgba(30, 30, 30, 0.7);
            opacity: 0.7;
        }
        
        .ending-id {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 1.1em;
        }
        
        .ending-title {
            font-size: 0.9em;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        
        .control-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 2px;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            min-width: 150px;
        }
        
        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #ff6b6b;
        }
        
        .luck-roll {
            font-style: italic;
            border-top: 1px dashed #ffffff;
            padding-top: 15px;
            margin-top: 20px;
            color: #ffd166;
            text-align: center;
            font-size: 1.1em;
        }
        
        .ending-text {
            font-size: 1.4em;
            font-weight: 500;
            text-align: center;
            padding: 30px;
            border: 3px solid #ffffff;
            margin-top: 20px;
            background-color: rgba(20, 20, 20, 0.8);
            border-radius: 4px;
            line-height: 1.8;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            position: relative;
        }
        
        .ending-text::before {
            content: "✦";
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.5em;
            color: #ff6b6b;
        }
        
        .ending-text::after {
            content: "✦";
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 1.5em;
            color: #ff6b6b;
        }
        
        .path-display {
            margin-top: 15px;
            font-size: 0.9em;
            color: #aaaaaa;
            border-top: 1px solid #333333;
            padding-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .path-icon {
            font-size: 1.2em;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .game-container {
                padding: 20px;
                min-height: 420px;
            }
            
            .title {
                font-size: 2em;
            }
            
            .story-text {
                font-size: 1.15em;
                padding: 15px;
            }
            
            .choice-btn {
                padding: 14px 18px;
                font-size: 1.05em;
            }
            
            .endings-list {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
            
            .controls {
                flex-wrap: wrap;
            }
            
            .control-btn {
                min-width: 130px;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.7em;
            }
            
            .story-text {
                font-size: 1.1em;
            }
            
            .game-stats {
                flex-direction: column;
                gap: 15px;
            }
            
            .endings-list {
                grid-template-columns: 1fr;
            }
            
            .control-btn {
                min-width: 100%;
            }
            .author-info {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            color: #aaaaaa;
            font-size: 0.9em;
            border-top: 1px solid #333333;
            padding-top: 15px;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">Vox Christmas Game</h1>
    <div class="subtitle">罪诞快乐，Vox</div>
    
    <div class="game-container" id="gameContainer">
        <div class="story-text fade-in" id="storyText">
            那场灾难性的战斗过后，你，Vox，地狱里曾经最有声望的家伙，如今只剩下一个头颅，这不太妙。罪诞铃声在远处响起，提醒你这是绝佳的机会——以获得你的身体为目标前进吧！
        </div>
        
        <div class="choices-container" id="choicesContainer">
            <!-- 选项将由JavaScript动态生成 -->
        </div>
        
        <div class="path-display">
            <span class="path-icon">↳</span>
            <span id="currentPath">当前位置: 起始点</span>
        </div>
    </div>
    
    <div class="game-stats">
        <div class="stats-item">
            <div class="stats-label">已解锁结局</div>
            <div class="stats-value" id="endingsCount">0/8</div>
        </div>
        <div class="stats-item">
            <div class="stats-label">游戏进度</div>
            <div class="stats-value" id="gameProgress">0%</div>
        </div>
        <div class="stats-item">
            <div class="stats-label">当前选择</div>
            <div class="stats-value" id="choicesMade">0</div>
        </div>
    </div>
    
    <div class="endings-container" id="endingsContainer">
        <div class="endings-title">收藏馆</div>
        <div class="endings-list" id="endingsList">
            <!-- 结局列表将由JavaScript动态生成 -->
        </div>
    </div>
    
    <div class="controls">
        <button class="control-btn" id="restartBtn">重新开始</button>
        <button class="control-btn" id="showEndingsBtn">查看结局</button>
        <button class="control-btn" id="hideEndingsBtn" style="display:none;">返回游戏</button>
        <button class="control-btn" id="hintBtn">游戏提示</button>
    </div>

<div class="author-info">作者：水熊虫汁&吸时上饮</div>

                choices: []

                next: "aloneHypnosisResult"

            "aloneHypnosisResult": {

            // 放弃分支
            "giveUp": {

            "ending1": {

 "ending5": {

                endingTitle: "旁观者"
            },

                text: "结局：孤独一人的圣诞夜<br><br>你被丢下了。他们甚至不想看到你，结伴出门享受节日氛围，独留你一人在塔里。你应该庆幸自己不是被丢出去了...大概吧。",

                endingId: 8,
                endingTitle: "孤独一人的圣诞夜",
            },
            
            "ending9": {
                text: "结局：圣诞模特<br><br>不错的圣诞模特。Velvette给你拍了无数张照片，换了无数套衣服（包括那件小洋裙）well，至少你现在有身体了。",
                isEnding: true,
                endingId: 9,
                endingTitle: "圣诞模特",
            },
            
            "ending7": {
                text: "结局：徒劳无功的循环<br><br>你兜兜转转一圈又回到了起点，什么都没改变。圣诞钟声响起，你仍然只是个头颅。但至少...你还活着？这算是安慰吗？",
                isEnding: true,
                endingId: 7,
                endingTitle:"徒劳无功的循环"
            }
        };

        // 游戏状态
        let gameState = {
            currentScene: "start",
            pathHistory: ["start"],
            unlockedEndings: [],
            allEndings: [
                { id: 1, title: "温馨圣诞夜", unlocked: false },
                { id: 2, title: "豁出去的礼物", unlocked: false },
                { id: 3, title: "错误选择的惨痛教训", unlocked: false },
                { id: 4, title: "你开心了，吗", unlocked: false },
                { id: 5, title: "回忆", unlocked: false },
                { id: 6, title: "旁观者", unlocked: false },
                { id: 8, title: "孤独一人的圣诞夜", unlocked: false },
                { id: 9, title: "圣诞模特", unlocked: false },
                { id: 7, title: "徒劳无功的循环", unlocked: false }
            ],
            choicesCount: 0
        };

        // DOM元素
        const storyTextElement = document.getElementById('storyText');
        const choicesContainer = document.getElementById('choicesContainer');
        const currentPathElement = document.getElementById('currentPath');
        const endingsCountElement = document.getElementById('endingsCount');
        const gameProgressElement = document.getElementById('gameProgress');
        const choicesMadeElement = document.getElementById('choicesMade');
        const endingsContainer = document.getElementById('endingsContainer');
        const endingsListElement = document.getElementById('endingsList');
        const restartBtn = document.getElementById('restartBtn');
        const showEndingsBtn = document.getElementById('showEndingsBtn');
        const hideEndingsBtn = document.getElementById('hideEndingsBtn');
        const hintBtn = document.getElementById('hintBtn');
        const gameContainer = document.getElementById('gameContainer');

        // 初始化游戏
        function initGame() {
            loadGameState();
            updateScene();
            updateEndingsList();
            updateGameStats();
            
            // 添加开场动画
            storyTextElement.classList.add('fade-in');
        }

        // 加载游戏状态
        function loadGameState() {
            const savedState = localStorage.getItem('voxGameState');
            if (savedState) {
                const parsedState = JSON.parse(savedState);
                // 合并保存的状态，确保新添加的结局也能被包含
                parsedState.allEndings = gameState.allEndings.map(ending => {
                    const savedEnding = parsedState.allEndings.find(e => e.id === ending.id);
                    return savedEnding ? {...ending, unlocked: savedEnding.unlocked} : ending;
                });
                gameState = parsedState;
            }
        }

        // 保存游戏状态
        function saveGameState() {
            localStorage.setItem('voxGameState', JSON.stringify(gameState));
        }

        // 更新场景
        function updateScene() {
            const scene = storyData[gameState.currentScene];
            
            // 特殊处理幸运判定场景
            if (gameState.currentScene === "aloneCommandResult") {
                const rollResult = Math.floor(Math.random() * 100) + 1;
                let resultText = "";
                let nextScene = "";
                
                if (rollResult > 50) {
                    resultText = `<div class='luck-roll'>幸运判定: ${rollResult} > 50</div><br>正当你打算用电线限制住那个向你疯狂扑过来的罪人时，他被一枪爆头，倒在你边上。瓦伦蒂诺把你抱了起来，但也只是看了你一眼，什么都没说。`;
                    nextScene = "ending7";
                } else {
                    resultText = `<div class='luck-roll'>幸运判定: ${rollResult} ≤ 50</div><br>你在行动时不小心从高处摔到地上，昏了过去。`;
                    nextScene = "ending5";
                }
                
                scene.text = resultText;
                scene.choices = [{ text: "继续", next: nextScene }];
            }
            
            // 显示场景文本
            storyTextElement.innerHTML = scene.text;
            storyTextElement.classList.add('fade-in');
            
            // 如果是结局，特殊处理
            if (scene.isEnding) {
                storyTextElement.innerHTML = `<div class="ending-text fade-in">${scene.text}</div>`;
                
                // 记录解锁的结局
                if (!gameState.unlockedEndings.includes(scene.endingId)) {
                    gameState.unlockedEndings.push(scene.endingId);
                    
                    // 更新全部结局中的解锁状态
                    const ending = gameState.allEndings.find(e => e.id === scene.endingId);
                    if (ending) {
                        ending.unlocked = true;
                    }
                    
                    updateGameStats();
                    updateEndingsList();
                    saveGameState();
                    
                    // 显示解锁通知
                    showUnlockNotification(scene.endingTitle);
                }
                
                // 结局后只显示重新开始按钮
                choicesContainer.innerHTML = '';
                const restartChoice = document.createElement('button');
                restartChoice.className = 'choice-btn';
                restartChoice.textContent = '重新开始游戏';
                restartChoice.addEventListener('click', restartGame);
                choicesContainer.appendChild(restartChoice);
                
                return;
            }
            
            // 更新路径显示
            updatePathDisplay();
            
            // 清空选项容器
            choicesContainer.innerHTML = '';
            
            // 添加选项按钮
            if (scene.choices && scene.choices.length > 0) {
                scene.choices.forEach(choice => {
                    const choiceButton = document.createElement('button');
                    choiceButton.className = 'choice-btn fade-in';
                    choiceButton.textContent = choice.text;
                    choiceButton.addEventListener('click', () => {
                        gameState.choicesCount++;
                        makeChoice(choice.next);
                    });
                    choicesContainer.appendChild(choiceButton);
                });
            } else if (scene.next) {
                // 如果只有一个后续路径
                const choiceButton = document.createElement('button');
                choiceButton.className = 'choice-btn fade-in';
                choiceButton.textContent = '继续旅程';
                choiceButton.addEventListener('click', () => {
                    gameState.choicesCount++;
                    makeChoice(scene.next);
                });
                choicesContainer.appendChild(choiceButton);
            }
            
            // 更新游戏统计
            updateGameStats();
            
            // 保存游戏状态
            saveGameState();
        }

        // 显示解锁通知
        function showUnlockNotification(endingTitle) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(30, 60, 30, 0.9);
                color: white;
                padding: 15px;
                border: 2px solid #4ecdc4;
                border-radius: 2px;
                z-index: 1000;
                box-shadow: 0 0 15px rgba(78, 205, 196, 0.5);
                max-width: 300px;
                animation: fadeIn 0.5s, fadeOut 0.5s 2.5s forwards;
            `;
            notification.innerHTML = `
                <strong>新结局解锁！</strong><br>
                ${endingTitle}
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }
            }, 3000);
        }

        // 做出选择
        function makeChoice(nextSceneId) {
            // 记录路径
            gameState.pathHistory.push(nextSceneId);
            gameState.currentScene = nextSceneId;
            
            // 移除所有淡入效果
            document.querySelectorAll('.fade-in').forEach(el => {
                el.classList.remove('fade-in');
            });
            
            setTimeout(() => {
                updateScene();
            }, 50);
        }

        // 更新路径显示
        function updatePathDisplay() {
            const pathNames = gameState.pathHistory.map(sceneId => {
                const scene = storyData[sceneId];
                if (!scene) return "未知";
                
                if (scene.isEnding) {
                    return `结局${scene.endingId}`;
                }
                
                // 提取场景描述中的关键词
                if (sceneId === "start") return "起始点";
                if (sceneId.includes("valentino")) return "Valentino路线";
                if (sceneId.includes("velvette")) return "Velvette路线";
                if (sceneId.includes("alone")) return "独自筹备";
                if (sceneId.includes("giveUp")) return "放弃路线";
                
                return "选择中";
            });
            
            currentPathElement.textContent = `路径: ${pathNames.join(" → ")}`;
        }

        // 更新游戏统计
        function updateGameStats() {
            const unlockedCount = gameState.unlockedEndings.length;
            const totalCount = gameState.allEndings.length;
            const progress = Math.round((unlockedCount / totalCount) * 100);
            
            endingsCountElement.textContent = `${unlockedCount}/${totalCount}`;
            gameProgressElement.textContent = `${progress}%`;
            choicesMadeElement.textContent = gameState.choicesCount;
        }

        // 更新结局列表
        function updateEndingsList() {
            endingsListElement.innerHTML = '';
            
            // 按ID排序
            const sortedEndings = [...gameState.allEndings].sort((a, b) => a.id - b.id);
            
            sortedEndings.forEach(ending => {
                const endingBadge = document.createElement('div');
                endingBadge.className = `ending-badge ${ending.unlocked ? 'ending-unlocked' : 'ending-locked'}`;
                
                endingBadge.innerHTML = `
                    <div class="ending-id">结局 ${ending.id}</div>
                    ${ending.unlocked ? `<div class="ending-title">${ending.title}</div>` : ''}
                `;
                
                endingsListElement.appendChild(endingBadge);
            });
            
            updateGameStats();
        }

        // 重新开始游戏
        function restartGame() {
            if (confirm("确定要重新开始游戏吗？当前进度将被保存，但当前选择路径将重置。")) {
                gameState.currentScene = "start";
                gameState.pathHistory = ["start"];
                gameState.choicesCount = 0;
                updateScene();
                hideEndings();
            }
        }

        // 显示结局收集
        function showEndings() {
            gameContainer.style.display = 'none';
            endingsContainer.style.display = 'block';
            showEndingsBtn.style.display = 'none';
            hideEndingsBtn.style.display = 'block';
            updateEndingsList();
        }

        // 隐藏结局收集
        function hideEndings() {
            gameContainer.style.display = 'block';
            endingsContainer.style.display = 'none';
            showEndingsBtn.style.display = 'block';
            hideEndingsBtn.style.display = 'none';
        }

        // 显示游戏提示
        function showHint() {
            alert("游戏提示：\n\n1. 探索所有选项以解锁全部9个结局\n2. 游戏进度会自动保存\n3. 尝试不同的策略来影响Valentino和Velvette\n4. 游戏进度会自动保存\n\n祝你好运，Vox！");
        }

        // 事件监听
        restartBtn.addEventListener('click', restartGame);
        showEndingsBtn.addEventListener('click', showEndings);
        hideEndingsBtn.addEventListener('click', hideEndings);
        hintBtn.addEventListener('click', showHint);

        // 初始化游戏
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
